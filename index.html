<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ffe6f0, #fff0f5);
    background-attachment: fixed;
    text-align: center;
    overflow-x: hidden; 
}

.section {
    display: none;
    padding: 40px 20px;
    min-height: 100vh;
    opacity: 0;
    transition: opacity 0.6s ease;
}

.section.active {
    display: block;

}

h1 {

}

.typewriter {

    color: #cc0066;

    margin: auto;
    min-height: 80px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    background: #ff3399;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 15px;
}
 button:active { 
     transform: scale(0.95);
 }

.gallery {
    margin-top: 30px;
}

.gallery img {
    width: 170px;
    margin: 8px;
    border-radius: 15px;
    box-shadow: 0 6px 18px rgba(255, 0, 102, 0.3);
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(255, 0, 102, 0.5);
}

.heart {
    position: fixed;
    bottom: -10px;
    color: #ff4d6d;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
.letter {

    padding: 40px;

  border: 4px double #d63384;
box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    font-family: 'Great Vibes', cursive;
font-size: 26px;
letter-spacing: 1px;
    font-size: 22px;
    color: #5a2a2a;
    line-height: 1.8;
    position: relative;
    transform: rotate(-1deg);
    overflow: visible;
}

  .rose-top {

  }

  }

/* TEXT ABOVE WATERMARK */
.letter #msg3 {

</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<script>
const messages = {
    msg1: "mera pyara💗.. cut💕..hot🫣..sundar🫠..bachha...Happy Birthday My Love 🎂❤️..6 March–The Day My Favorite Person Was Born",
    msg2: "you are my girl❤️.. my girlfriend 💖..my wife👩‍❤️‍👨.. my peace ✌️... my bestfriend ♥️.....my love👩‍❤️‍👨..my world🫶..my everything✌️..ILOVEYOU💖",
    msg3: "mera bachhha..mera babyyy 😚.. jese aapko pta apka or mera jhagda to hote rhega yeh to shayd bhagwan ne hi tay kiya hoga ki yeh doto bina jhgde kese reh rhe or voh bhi bolte honge inke life me jldi se jldi kalesh lao😂..but fir bhi kitna bhi jhgda ho sachhai yeh he babyy muze aapka sath chahiye hmesha or hmesha hi.. jhgde ho rhe he,kalesh ho rha he firbhi isko kbhi bhi mtlb kbhi bhi khudki glti mt smjhna..  yeh bss ho rha he apne sath to yeh kbhi aapki glti nhi thi ... pr haa mera bachha aap compatible partner ka sochna bhi nhi aap... mere liye aapse jyada compatible koi ho bhi skta he kya ..or hone ka .0001% bhi chance hoga n firbhi nhi chahiye muze.. bilkul bhi nhi...muze bss meri Mannati chahiye🤧 bss meri Mannat ..samjhe n.. babyy I love you babyyyy 💋bahot hi jyada.... or firse... HAPPY BIRTHDAY MY LOVE💕...MERA PYARA BACHHA😙... I LOVE YOU♾️... And i hope kitni bhi difficulties q nah aaye aap muze hmesha choose kroge👉👈... or haa jitne bhi zagde he merese krna q ki meko sb jhgde aapse krne he🤧"
}; 

function typeWriter(elementId, text, speed = 40) {
    let i = 0;
    const element = document.getElementById(elementId);
    element.innerHTML = "";

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}
let musicStarted = false;
function goToPage(pageNumber) {

    const music = document.getElementById("bgMusic");

if (!musicStarted) {
    music.volume = 0.6;
    music.currentTime = 0;

    setTimeout(() => {
        music.play();
    }, 100);

    musicStarted = true;
}
    document.querySelectorAll(".section").forEach(section => {
        section.classList.remove("active");
    });

    document.getElementById("page" + pageNumber).classList.add("active");

    typeWriter("msg" + pageNumber, messages["msg" + pageNumber]);

    if (pageNumber === 2) {
        startFireworks();
    }
}

function yesClicked() {
    const bigHeart = document.createElement("div");
    bigHeart.innerHTML = "😘";
    bigHeart.style.position = "fixed";
    bigHeart.style.fontSize = "200px";
    bigHeart.style.top = "50%";
    bigHeart.style.left = "50%";
    bigHeart.style.transform = "translate(-50%, -50%) scale(0)";
    bigHeart.style.transition = "0.6s";
    document.body.appendChild(bigHeart);

    setTimeout(() => {
        bigHeart.style.transform = "translate(-50%, -50%) scale(1.5)";
    }, 50);

    setTimeout(() => {
        bigHeart.remove();
        goToPage(3);
    }, 800);
}

function startFireworks() {
    let duration = 3 * 1000;
    let animationEnd = Date.now() + duration;

    (function frame() {
        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });

        if (Date.now() < animationEnd) {
            requestAnimationFrame(frame);
        }
    })();
}

document.addEventListener("DOMContentLoaded", function() {

    typeWriter("msg1", messages.msg1);
    setInterval(createHeart, 500);

    const noBtn = document.getElementById("noBtn");
    noBtn.addEventListener("mouseover", function() {
        const x = Math.random() * window.innerWidth * 0.7;
        const y = Math.random() * window.innerHeight * 0.7;
        noBtn.style.position = "absolute";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    confetti({
        particleCount: 150,
        spread: 90,
        origin: { y: 0.6 }
    });
});

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    const items = ["❤️", "I love you 💕", "My Princess 👑", "Forever ♾️", "MyLOVE😻"];
    heart.innerHTML = items[Math.floor(Math.random() * items.length)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 15 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}
</script>

</body>
